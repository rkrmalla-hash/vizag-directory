<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<!-- MOBILE RESPONSIVE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<title>SISYP - Andhra Pradesh Business Directory</title>

<meta name="description" content="Find trusted businesses in Andhra Pradesh including hospitals, schools, restaurants, hotels and more. Add your business for free on SISYP.">

<meta name="keywords" content="Vizag directory, Andhra Pradesh businesses, hospitals, schools, restaurants, hotels, local services">

<meta name="author" content="SISYP Directory">

<meta name="robots" content="index, follow">

<!-- SOCIAL SHARING -->
<meta property="og:title" content="SISYP Business Directory">
<meta property="og:description" content="Find trusted businesses in Andhra Pradesh. Add your business for free.">
<meta property="og:image" content="logo.png">
<meta property="og:type" content="website">

<!-- FAVICON -->
<link rel="icon" href="logo.png">

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
  background:#f5f7fb;
  color:#222;
  scroll-behavior:smooth;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0f172a,#1e293b,#334155,#1e40af,#0f172a);
  background-size:300% 300%;
  animation:headerMove 8s ease infinite;
  padding:18px 35px;
  min-height:210px;
  display:flex;
  align-items:center;
  gap:28px;
  position:sticky;
  top:0;
  z-index:999;
  box-shadow:0 8px 20px rgba(0,0,0,0.18);
  border-bottom:3px solid rgba(255,255,255,0.08);
}
@keyframes headerMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* BIG LOGO */
.site-logo{
  width:175px;
  height:175px;
  object-fit:contain;
  background:#fff;
  padding:6px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.22);
}

/* CENTER TEXT */
.header-text{
  flex:1;
  text-align:center;
  overflow:hidden;
}

/* MAIN TITLE */
.header-text h1{
  margin:0;
  font-size:42px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
  background:linear-gradient(90deg,#facc15,#ffffff,#facc15);
  background-size:250% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:textShine 4s linear infinite;
}

@keyframes textShine{
  to{background-position:250% center;}
}

/* SUBTITLE */
.header-text p{
  margin:12px 0 0;
  font-size:28px;
  color:#ffffff;
  font-weight:700;
  text-shadow:0 2px 6px rgba(0,0,0,0.25);
}

/* TOP MENU */
.top-actions{
  padding:15px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
  width:100%;
  box-sizing:border-box;
}

.left-menu{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  flex:1;
}

.right-cta{
  margin-left:auto;
  flex-shrink:0;
}

.search-box{
  width:calc(100% - 40px);
  margin:18px 20px;
  padding:14px;
  border:none;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.category-btn{
  padding:10px 14px;
  margin:4px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#2563eb;
  color:#fff;
  font-weight:600;
}

.category-btn:hover{
  background:#1d4ed8;
}

.free-btn{
  background:linear-gradient(135deg,#ff6a00,#ff9800,#ffc107);
  color:#fff;
  border:none;
  padding:14px 22px;
  border-radius:50px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 12px 25px rgba(255,152,0,0.35);
  animation:bounceGlow 1.8s infinite;
  white-space:nowrap;
}

.free-btn:hover{
  transform:translateY(-3px) scale(1.04);
}

@keyframes bounceGlow{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
}

.card{
  background:#fff;
  padding:18px;
  margin:20px;
  border-radius:16px;
  box-shadow:0 10px 24px rgba(0,0,0,0.08);
}

.business-img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:12px;
}

.btn{
  display:inline-block;
  padding:10px 14px;
  margin-top:8px;
  margin-right:6px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-size:14px;
}

.whatsapp{background:#25D366;}
.map{background:#1e88e5;}

@media(max-width:900px){
  .top-actions{
    flex-direction:column;
    align-items:stretch;
  }

  .right-cta{
    margin-left:0;
  }

  .free-btn{
    width:100%;
  }

  .header{
    flex-direction:column;
    text-align:center;
  }

  .site-logo{
    width:130px;
    height:130px;
  }

  .header-text h1{
    font-size:28px;
  }

  .header-text p{
    font-size:18px;
  }
}
</style>

</head>

<body>
<div class="header">
  <img src="logo.png" class="site-logo">

  <div class="header-text">
    <h1>SOUTHERN INFORMATION SERVICES YELLOW PAGES</h1>
    <p>Business Directory in Andhra Pradesh Since 28 Years</p>
  </div>
</div>
<div class="top-actions">

  <div class="left-menu">
    <button class="category-btn" onclick="filterCategory('all')">All</button>
    <button class="category-btn" onclick="filterCategory('Hospitals')">Hospitals</button>
    <button class="category-btn" onclick="filterCategory('Schools')">Schools</button>
    <button class="category-btn" onclick="filterCategory('Restaurants')">Restaurants</button>
    <button class="category-btn" onclick="filterCategory('Hotels')">Hotels</button>
  </div>

  <div class="right-cta">
    <button class="free-btn" onclick="toggleForm()">
      ➕ Add Free Business Listing
    </button>
  </div>

</div>
 
<input class="search-box" type="text" id="search" onkeyup="searchFunction()" placeholder="Search businesses...">

<!-- FORM -->
<div id="form" style="display:none; background:white; padding:15px; margin-top:10px; border-radius:10px;">

  <h3>Add Your Business</h3>

  <input id="bname" placeholder="Business Name" style="width:100%;padding:8px;margin:5px 0;">

  <select id="bcategory" style="width:100%;padding:8px;margin:5px 0;">
    <option value="">Select Category</option>
    <option>Hospitals</option>
    <option>Schools</option>
    <option>Real Estate</option>
    <option>Home Services</option>
    <option>Electricians</option>
    <option>Plumbers</option>
    <option>Car Repair</option>
    <option>Packers & Movers</option>
    <option>Beauty Parlours</option>
    <option>Hotels</option>
    <option>Restaurants</option>
    <option>Contractors</option>
    <option>Old Age Care</option>
    <option>Pest Control</option>
  </select>
  <input id="baddress" placeholder="Business Address" style="width:100%;padding:8px;margin:5px 0;">

  <textarea id="bdesc" placeholder="Short Description" style="width:100%;padding:8px;margin:5px 0;height:80px;"></textarea>

  <input id="bimage" placeholder="Business Image URL" style="width:100%;padding:8px;margin:5px 0;">

  <input id="bphone" placeholder="WhatsApp Number (with country code)" style="width:100%;padding:8px;margin:5px 0;">
  <input id="bmap" placeholder="Google Maps Link" style="width:100%;padding:8px;margin:5px 0;">

  <button onclick="addBusiness()" class="category-btn" style="background:green;color:white;">
    Submit
  </button>

</div>

<!-- BUSINESS LIST -->
<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBEwT_Inq8SpSg6rGknWhXHDX6ub3XJqRo",
  authDomain: "vizag-directory-776bb.firebaseapp.com",
  projectId: "vizag-directory-776bb",
  storageBucket: "vizag-directory-776bb.appspot.com",
  messagingSenderId: "60115144725",
  appId: "1:60115144725:web:10d21d71913a73f9417e1c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("businesses")
  .where("status", "==", "approved")
  .onSnapshot((snapshot) => {

    document.getElementById("list").innerHTML = "";

    snapshot.forEach((doc) => {
      let data = doc.data();

      let card = document.createElement("div");
      card.className = "card business";
      card.setAttribute("data-category", data.category);

      card.innerHTML = `
  <img class="business-img" src="${data.image || 'https://via.placeholder.com/400x180?text=Business+Image'}">
  <h3>${data.name}</h3>
  <p><strong>Category:</strong> ${data.category}</p>
  <p><strong>Address:</strong> ${data.address || ""}</p>
  <p>${data.desc || ""}</p>

  <a class="btn whatsapp" href="https://wa.me/${data.phone}" target="_blank">WhatsApp</a>
  <a class="btn map" href="${data.map}" target="_blank">View Map</a>

  <button class="btn" style="background:#ff9800;" onclick="addReview('${doc.id}')">
    Add Review
  </button>

  <div id="reviews-${doc.id}" style="margin-top:10px;"></div>
`;

      document.getElementById("list").appendChild(card);
loadReviews(doc.id);
    });
});

function addBusiness() {
  let name = document.getElementById("bname").value;
  let category = document.getElementById("bcategory").value;
  let address = document.getElementById("baddress").value;
  let desc = document.getElementById("bdesc").value;
  let image = document.getElementById("bimage").value;
  let phone = document.getElementById("bphone").value;
  let map = document.getElementById("bmap").value;

  if (!name || !category || !address || !desc || !phone || !map) {
    alert("Please fill all fields");
    return;
  }

  db.collection("businesses").add({
    name: name,
    category: category,
    address: address,
    desc: desc,
    image: image,
    phone: phone,
    map: map,
    status: "pending"
  });

  alert("Business saved! Waiting for approval.");

  document.getElementById("bname").value = "";
  document.getElementById("bcategory").value = "";
  document.getElementById("baddress").value = "";
  document.getElementById("bdesc").value = "";
  document.getElementById("bimage").value = "";
  document.getElementById("bphone").value = "";
  document.getElementById("bmap").value = "";

  document.getElementById("form").style.display = "none";
}

function toggleForm() {
  let form = document.getElementById("form");
  form.style.display = form.style.display === "block" ? "none" : "block";
}

function searchFunction() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("business");

  for (let i = 0; i < cards.length; i++) {
    let text = cards[i].innerText.toLowerCase();
    cards[i].style.display = text.includes(input) ? "" : "none";
  }
}

function filterCategory(category) {
  let cards = document.getElementsByClassName("business");

  for (let i = 0; i < cards.length; i++) {
    let cardCategory = cards[i].getAttribute("data-category");

    if (category === "all" || cardCategory === category) {
      cards[i].style.display = "";
    } else {
      cards[i].style.display = "none";
    }
  }
}

function addReview(id) {
  let user = prompt("Your Name:");
  if (!user) return;

  let rating = prompt("Rating (1 to 5):");
  if (!rating) return;

  let comment = prompt("Your Review:");
  if (!comment) return;

  db.collection("businesses")
    .doc(id)
    .collection("reviews")
    .add({
      user: user,
      rating: rating,
      comment: comment
    });

  alert("Review Added!");
}

function loadReviews(id) {
  db.collection("businesses")
    .doc(id)
    .collection("reviews")
    .onSnapshot((snapshot) => {

      let box = document.getElementById("reviews-" + id);
      if (!box) return;

      box.innerHTML = "<h4>Reviews</h4>";

      snapshot.forEach((doc) => {
        let r = doc.data();

        box.innerHTML += `
          <p>⭐ ${r.rating} - <strong>${r.user}</strong><br>${r.comment}</p>
        `;
      });

    });
}
</script>

</body>
</html>
