<!DOCTYPE html>
<html>
<head>
  <title>Vizag Business Directory</title>

  <!-- FIREBASE SCRIPTS -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f4f6f8;
    }

    h1 {
      color: #1a237e;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .business-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      margin-top: 8px;
      margin-right: 5px;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    .whatsapp { background: #25D366; }
    .map { background: #1e88e5; }

    .category-btn {
      padding: 8px 10px;
      margin: 5px 5px 10px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e0e0e0;
    }

    .category-btn:hover {
      background: #c5cae9;
    }

    select, input, textarea {
      border: 1px solid #ccc;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h1>Vizag Business Directory</h1>

<button class="category-btn" onclick="toggleForm()">➕ Add Business</button>

<button class="category-btn" onclick="filterCategory('all')">All</button>
<button class="category-btn" onclick="filterCategory('Hospitals')">Hospitals</button>
<button class="category-btn" onclick="filterCategory('Schools')">Schools</button>
<button class="category-btn" onclick="filterCategory('Restaurants')">Restaurants</button>
<button class="category-btn" onclick="filterCategory('Hotels')">Hotels</button>

<input class="search-box" type="text" id="search" onkeyup="searchFunction()" placeholder="Search businesses...">

<!-- FORM -->
<div id="form" style="display:none; background:white; padding:15px; margin-top:10px; border-radius:10px;">

  <h3>Add Your Business</h3>

  <input id="bname" placeholder="Business Name" style="width:100%;padding:8px;margin:5px 0;">

  <select id="bcategory" style="width:100%;padding:8px;margin:5px 0;">
    <option value="">Select Category</option>
    <option>Hospitals</option>
    <option>Schools</option>
    <option>Real Estate</option>
    <option>Home Services</option>
    <option>Electricians</option>
    <option>Plumbers</option>
    <option>Car Repair</option>
    <option>Packers & Movers</option>
    <option>Beauty Parlours</option>
    <option>Hotels</option>
    <option>Restaurants</option>
    <option>Contractors</option>
    <option>Old Age Care</option>
    <option>Pest Control</option>
  </select>

  <input id="baddress" placeholder="Business Address" style="width:100%;padding:8px;margin:5px 0;">

  <textarea id="bdesc" placeholder="Short Description" style="width:100%;padding:8px;margin:5px 0;height:80px;"></textarea>

  <input id="bimage" placeholder="Business Image URL" style="width:100%;padding:8px;margin:5px 0;">

  <input id="bphone" placeholder="WhatsApp Number (with country code)" style="width:100%;padding:8px;margin:5px 0;">
  <input id="bmap" placeholder="Google Maps Link" style="width:100%;padding:8px;margin:5px 0;">

  <button onclick="addBusiness()" class="category-btn" style="background:green;color:white;">
    Submit
  </button>

</div>

<!-- BUSINESS LIST -->
<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBEwT_Inq8SpSg6rGknWhXHDX6ub3XJqRo",
  authDomain: "vizag-directory-776bb.firebaseapp.com",
  projectId: "vizag-directory-776bb",
  storageBucket: "vizag-directory-776bb.appspot.com",
  messagingSenderId: "60115144725",
  appId: "1:60115144725:web:10d21d71913a73f9417e1c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("businesses")
  .where("status", "==", "approved")
  .onSnapshot((snapshot) => {

    document.getElementById("list").innerHTML = "";

    snapshot.forEach((doc) => {
      let data = doc.data();

      let card = document.createElement("div");
      card.className = "card business";
      card.setAttribute("data-category", data.category);

      card.innerHTML = `
  <img class="business-img" src="${data.image || 'https://via.placeholder.com/400x180?text=Business+Image'}">
  <h3>${data.name}</h3>
  <p><strong>Category:</strong> ${data.category}</p>
  <p><strong>Address:</strong> ${data.address || ""}</p>
  <p>${data.desc || ""}</p>

  <a class="btn whatsapp" href="https://wa.me/${data.phone}" target="_blank">WhatsApp</a>
  <a class="btn map" href="${data.map}" target="_blank">View Map</a>

  <button class="btn" style="background:#ff9800;" onclick="addReview('${doc.id}')">
    Add Review
  </button>

  <div id="reviews-${doc.id}" style="margin-top:10px;"></div>
`;

      document.getElementById("list").appendChild(card);
    });
});

function addBusiness() {
  let name = document.getElementById("bname").value;
  let category = document.getElementById("bcategory").value;
  let address = document.getElementById("baddress").value;
  let desc = document.getElementById("bdesc").value;
  let image = document.getElementById("bimage").value;
  let phone = document.getElementById("bphone").value;
  let map = document.getElementById("bmap").value;

  if (!name || !category || !address || !desc || !phone || !map) {
    alert("Please fill all fields");
    return;
  }

  db.collection("businesses").add({
    name: name,
    category: category,
    address: address,
    desc: desc,
    image: image,
    phone: phone,
    map: map,
    status: "pending"
  });

  alert("Business saved! Waiting for approval.");

  document.getElementById("bname").value = "";
  document.getElementById("bcategory").value = "";
  document.getElementById("baddress").value = "";
  document.getElementById("bdesc").value = "";
  document.getElementById("bimage").value = "";
  document.getElementById("bphone").value = "";
  document.getElementById("bmap").value = "";

  document.getElementById("form").style.display = "none";
}

function toggleForm() {
  let form = document.getElementById("form");
  form.style.display = form.style.display === "block" ? "none" : "block";
}

function searchFunction() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("business");

  for (let i = 0; i < cards.length; i++) {
    let text = cards[i].innerText.toLowerCase();
    cards[i].style.display = text.includes(input) ? "" : "none";
  }
}

function filterCategory(category) {
  let cards = document.getElementsByClassName("business");

  for (let i = 0; i < cards.length; i++) {
    let cardCategory = cards[i].getAttribute("data-category");

    if (category === "all" || cardCategory === category) {
      cards[i].style.display = "";
    } else {
      cards[i].style.display = "none";
    }
  }
}
</script>

</body>
</html>
