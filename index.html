<!DOCTYPE html>
<html>
<head>
  <title>Vizag Business Directory</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f4f6f8;
    }

    h1 {
      color: #1a237e;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      margin-top: 8px;
      margin-right: 5px;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    .whatsapp {
      background: #25D366;
    }

    .map {
      background: #1e88e5;
    }

    .category-btn {
      padding: 8px 10px;
      margin: 5px 5px 10px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e0e0e0;
    }

    .category-btn:hover {
      background: #c5cae9;
    }
  </style>
</head>

<body>

<h1>Vizag Business Directory</h1>

<button class="category-btn" onclick="document.getElementById('form').style.display='block'">
  ➕ Add Business
</button>

<button class="category-btn" onclick="filterCategory('all')">All</button>
<button class="category-btn" onclick="filterCategory('Food')">Food</button>
<button class="category-btn" onclick="filterCategory('Healthcare')">Healthcare</button>

<input class="search-box" type="text" id="search" onkeyup="searchFunction()" placeholder="Search businesses...">

<!-- FORM -->
<div id="form" style="display:none; background:white; padding:15px; margin-top:10px; border-radius:10px;">

  <h3>Add Your Business</h3>

  <input id="bname" placeholder="Business Name" style="width:100%;padding:8px;margin:5px 0;"><br>
  <input id="bcategory" placeholder="Category" style="width:100%;padding:8px;margin:5px 0;"><br>
  <input id="bphone" placeholder="WhatsApp Number (with country code)" style="width:100%;padding:8px;margin:5px 0;"><br>
  <input id="bmap" placeholder="Google Maps Link" style="width:100%;padding:8px;margin:5px 0;"><br>

  <button onclick="addBusiness()" class="category-btn" style="background:green;color:white;">
    Submit
  </button>

</div>

<!-- BUSINESSES -->
<div id="list">

<div class="card business" data-category="Food">
  <h3>ABC Restaurant</h3>
  <p>Category: Food</p>
  <a class="btn whatsapp" href="https://wa.me/919999999999">WhatsApp</a>
  <a class="btn map" href="https://maps.google.com">View Map</a>
</div>

<div class="card business" data-category="Healthcare">
  <h3>City Hospital</h3>
  <p>Category: Healthcare</p>
  <a class="btn whatsapp" href="https://wa.me/919999999999">WhatsApp</a>
  <a class="btn map" href="https://maps.google.com">View Map</a>
</div>

</div>

<!-- SCRIPT -->
<script>
function searchFunction() {
  let input = document.getElementById('search').value.toLowerCase();
  let cards = document.getElementsByClassName('business');

  for (let i = 0; i < cards.length; i++) {
    let text = cards[i].innerText.toLowerCase();
    cards[i].style.display = text.includes(input) ? "" : "none";
  }
}

function filterCategory(category) {
  let cards = document.getElementsByClassName('business');

  for (let i = 0; i < cards.length; i++) {
    let cardCategory = cards[i].getAttribute("data-category");

    if (category === "all" || cardCategory === category) {
      cards[i].style.display = "";
    } else {
      cards[i].style.display = "none";
    }
  }
}

function addBusiness() {
  let name = document.getElementById("bname").value;
  let category = document.getElementById("bcategory").value;
  let phone = document.getElementById("bphone").value;
  let map = document.getElementById("bmap").value;

  let card = document.createElement("div");
  card.className = "card business";
  card.setAttribute("data-category", category);

  card.innerHTML = `
    <h3>${name}</h3>
    <p>Category: ${category}</p>
    <a class="btn whatsapp" href="https://wa.me/${phone}">WhatsApp</a>
    <a class="btn map" href="${map}" target="_blank">View Map</a>
  `;

  document.getElementById("list").appendChild(card);

  document.getElementById("form").style.display = "none";
}
</script>

</body>
</html>
